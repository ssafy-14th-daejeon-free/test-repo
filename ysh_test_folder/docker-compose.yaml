services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: velog_clone
      POSTGRES_USER: velog_user
      POSTGRES_PASSWORD: velog_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velog_user -d velog_clone"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      ENABLE_LOCAL_LOGIN: "1"
      POSTGRES_DB: velog_clone
      POSTGRES_USER: velog_user
      POSTGRES_PASSWORD: velog_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - media_data:/app/media

volumes:
  postgres_data:
  media_data:
