{% extends "base.html" %}

{% block title %}Delete post - velog clone{% endblock %}

{% block content %}
<section class="auth-panel">
  <h1>Delete post</h1>
  <p><strong>{{ post.title }}</strong> will be deleted. This cannot be undone.</p>
  <form method="post" class="form">
    {% csrf_token %}
    <button class="button button-danger" type="submit">Delete</button>
    <a class="button" href="{{ post.get_absolute_url }}">Cancel</a>
  </form>
</section>
{% endblock %}
