{% extends "base.html" %}

{% block title %}Login - velog clone{% endblock %}

{% block content %}
<section class="auth-panel">
  <h1>Login</h1>
  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button button-primary" type="submit">Login</button>
  </form>
  <p class="muted">No account yet? <a href="{% url 'signup' %}">Sign up</a>.</p>
</section>
{% endblock %}
