{% extends "base.html" %}

{% block title %}로그인 · Django Blog{% endblock %}

{% block content %}
<section class="auth-panel">
  <h1>로그인</h1>
  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button button-primary" type="submit">로그인</button>
  </form>
  <p class="muted">계정이 없다면 <a href="{% url 'signup' %}">회원가입</a>을 진행하세요.</p>
</section>
{% endblock %}
